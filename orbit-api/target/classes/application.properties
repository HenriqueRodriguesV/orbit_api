# =============================================
# ORBIT API - Configuração Principal (Oracle)
# =============================================

# Banco de Dados Oracle
# Substitua pelas suas credenciais FIAP ou defina as variáveis de ambiente:
#   ORACLE_URL, ORACLE_USERNAME, ORACLE_PASSWORD
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${ORACLE_USERNAME:rm562917}
spring.datasource.password=${ORACLE_PASSWORD:@rm562917}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.defer-datasource-initialization=true

# JWT
orbit.jwt.secret=${JWT_SECRET:orbit-secret-key-fiap-global-solution-2026-henrique-rm562917}
orbit.jwt.expiration=86400000

# Servidor
server.port=8080

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# Logs
logging.level.br.com.fiap.orbit=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Serialização de datas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
